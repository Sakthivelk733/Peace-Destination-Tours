<!DOCTYPE html>
<html>
<head>
    <title>Login | Peace Destination Tours</title>

    <style>
        body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    height:100vh ;
    position: relative;
    background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    animation: fadeIn 2s ease-in-out;
}

        .container-login {
            width: 750px;
            height: 420px;
            background: white;
            border-radius: 12px;
            display: flex;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .box {
            width: 50%;
            padding: 40px;
            text-align: center;
        }

        .left-box { background: #f2f2f2; }
        .right-box { background: #ffffff; }

        .box input {
            width: 90%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            border: 1px solid #bbb;
        }

        .box button {
            padding: 12px 25px;
            width: 100%;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .box button:hover {
            background: #e43a59;
        }
    </style>

</head>

<body>

<div class="container-login">

    <!-- LOGIN  -->
    <div class="box left-box">
        <h2>Sign In</h2>

        <input type="text" id="loginUser" placeholder="Enter Username">
        <input type="password" id="loginPass" placeholder="Enter Password">

        <button onclick="login()">Login</button>
    </div>

    <!-- SIGN UP -->
    <div class="box right-box">
        <h2>Create User Account</h2>

        <input type="text" id="newUser" placeholder="Create Username">
        <input type="password" id="newPass" placeholder="Create Password">

        <button onclick="createAccount()">Create Account</button>
    </div>

</div>



<script>
/* ==========================
   CREATE ACCOUNT
   ========================== */
function createAccount() {
    let u = newUser.value.trim();
    let p = newPass.value.trim();

    if (u === "" || p === "") {
        alert("Please fill all fields!");
        return;
    }

    let data = {
        username: u,
        password: p
    };

    localStorage.setItem("userAccount", JSON.stringify(data));

    alert("Account Created! Please Login.");

    newUser.value = "";
    newPass.value = "";
}


/* ==========================
   LOGIN (ADMIN + USER)
   ========================== */
function login() {
    let u = loginUser.value.trim();
    let p = loginPass.value.trim();

    let user = JSON.parse(localStorage.getItem("userAccount"));

    // ADMIN LOGIN
    if (u === "admin" && p === "sakthi") {
        alert("Admin Login Successful!");
        window.location.href = "admin.html";
        return;
    }

    // USER LOGIN
    if (user && u === user.username && p === user.password) {
        alert("User Login Successful!");
        window.location.href = "user.html";
        return;
    }

    // FAIL
    alert("Invalid Username or Password");
}
</script>

</body>
</html>
